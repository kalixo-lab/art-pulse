<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Working Supabase Test</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:30px;
}

input{
    width:300px;
    padding:10px;
    margin-top:10px;
    display:block;
}

button{
    padding:10px 20px;
    margin-top:10px;
    cursor:pointer;
}

#messages{
    margin-top:30px;
}

.msg{
    background:#222;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

</style>
</head>
<body>

<h1>Supabase Working Test</h1>

<input id="username" placeholder="username">

<input id="message" placeholder="message">

<button onclick="sendMessage()">
Send
</button>

<div id="messages"></div>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://vwaddjunjgsfvwsldpyl.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3YWRkanVuamdzZnZ3c2xkcHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MTAyNDAsImV4cCI6MjA5NTI4NjI0MH0.njrg8MEKQbL0IjQGvUqosyfSlxGvx2eYj8qKtCAPWZQ'
)

async function sendMessage(){

    const username =
    document.getElementById("username").value

    const message =
    document.getElementById("message").value

    await supabase
    .from("messages")
    .insert([
        {
            username:username,
            message:message
        }
    ])

    loadMessages()
}

async function loadMessages(){

    const { data } =
    await supabase
    .from("messages")
    .select("*")
    .order("id",{ascending:false})

    const box =
    document.getElementById("messages")

    box.innerHTML = ""

    data.forEach(item=>{

        box.innerHTML += `
        <div class="msg">
            <b>${item.username}</b>
            <br>
            ${item.message}
        </div>
        `
    })
}

window.sendMessage = sendMessage

loadMessages()

</script>

</body>
</html>
